<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SymSafe Clinician Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#333;min-height:100vh;display:flex;flex-direction:column}
.header{background:#2c3e50;color:#fff;padding:16px 24px;text-align:center}
.header h1{font-size:18px;font-weight:700}
.login-box{max-width:360px;margin:60px auto;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:32px}
.login-box h2{font-size:18px;color:#2c3e50;margin-bottom:20px;text-align:center}
.login-box label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px}
.login-box input[type=password]{width:100%;padding:10px 14px;border:1.5px solid #ccc;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:16px}
.login-box input:focus{outline:none;border-color:#2c3e50}
.login-box button{width:100%;padding:12px;background:#2c3e50;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-box button:hover{background:#1a252f}
.error{background:#fde8e8;color:#c0392b;border:1px solid #e6b0aa;border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<div class="header"><h1>SymSafe clinician review</h1></div>
<div class="login-box">
  <h2>Clinician Login</h2>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/review/login">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required autofocus>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
