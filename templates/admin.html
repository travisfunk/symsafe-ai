<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel – SymSafe AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; max-width: 1000px; margin: auto; }
    pre { background: #f8f9fa; padding: 1rem; border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2 class="mb-4">🛠️ Admin Panel</h2>

  {% for filename, content in files.items() %}
    <h5 class="mt-4">{{ filename }}</h5>
    <pre>{{ content }}</pre>
  {% endfor %}
</body>
</html>
