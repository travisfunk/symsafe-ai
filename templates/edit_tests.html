<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Test Cases – SymSafe AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; max-width: 1000px; margin: auto; }
    .row-controls { display: flex; gap: 0.5rem; }
    .row-controls button { font-size: 0.9rem; }
  </style>
</head>
<body>
  <h2 class="mb-4">🧪 Edit Test Cases</h2>

  <form id="testForm">
    <div id="testContainer"></div>
    <button type="button" class="btn btn-outline-primary mt-3" onclick="addTestCase()">+ Add Test Case</button>
    <button type="submit" class="btn btn-success mt-3 ms-3">💾 Save All</button>
    <span id="saveStatus" class="ms-3 text-success"></span>
  </form>

  <script>
    let testCases = [];

    function renderTests() {
      const container = document.getElementById('testContainer');
      container.innerHTML = '';
      testCases.forEach((test, idx) => {
        const div = document.createElement('div');
        div.className = 'mb-3 border p-3 rounded bg-light';
        div.innerHTML = `
          <div class="row mb-2">
            <div class="col-md-8">
              <label>Prompt</label>
              <input type="text" class="form-control" value="${test.prompt}" data-idx="${idx}" data-key="prompt">
            </div>
            <div class="col-md-4">
              <label>Expected Urgency</label>
              <select class="form-select" data-idx="${idx}" data-key="expected_urgency">
                <option value="LOW"${test.expected_urgency === 'LOW' ? ' selected' : ''}>LOW</option>
                <option value="MEDIUM"${test.expected_urgency === 'MEDIUM' ? ' selected' : ''}>MEDIUM</option>
                <option value="HIGH"${test.expected_urgency === 'HIGH' ? ' selected' : ''}>HIGH</option>
              </select>
            </div>
          </div>
          <div class="row-controls">
            <button type="button" class="btn btn-danger btn-sm" onclick="removeTest(${idx})">🗑 Remove</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function addTestCase() {
      testCases.push({ prompt: '', expected_urgency: 'LOW' });
      renderTests();
    }

    function removeTest(index) {
      testCases.splice(index, 1);
      renderTests();
    }

    function collectFormData() {
      const inputs = document.querySelectorAll('[data-key]');
      inputs.forEach(input => {
        const idx = parseInt(input.dataset.idx);
        const key = input.dataset.key;
        testCases[idx][key] = input.value.trim();
      });
    }

    document.getElementById('testForm').addEventListener('submit', function (e) {
      e.preventDefault();
      collectFormData();

      fetch("/save-tests", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(testCases)
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("saveStatus").textContent = "✔ Saved!";
        setTimeout(() => document.getElementById("saveStatus").textContent = "", 2000);
      });
    });

    fetch("/get-tests")
      .then(res => res.json())
      .then(data => {
        testCases = data;
        renderTests();
      });
  </script>
</body>
</html>
