<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Test Cases</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    .table td textarea {
      width: 100%;
      resize: vertical;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container py-4">
    <h2 class="mb-4">🧪 Edit Test Cases + Live Runner</h2>
    <div class="mb-3 d-flex justify-content-between align-items-center">
      <div class="d-flex gap-2">
        <input id="searchInput" type="text" class="form-control" placeholder="Search test input...">
        <select id="symptomFilter" class="form-select">
          <option value="">All symptoms</option>
        </select>
      </div>
      <button class="btn btn-success" onclick="addTestCase()">➕ Add Test Case</button>
    </div>
    <table class="table table-bordered table-hover bg-white">
      <thead class="table-light">
        <tr>
          <th>Input</th>
          <th>Expected Symptom</th>
          <th>Escalation</th>
          <th>Run</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="testTableBody"></tbody>
    </table>
  </div>

    let testCases = [];

        .then(res => res.json())
        .then(data => {
          console.log("✅ Loaded test cases:", data);
