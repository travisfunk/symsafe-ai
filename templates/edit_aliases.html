<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Aliases – SymSafe AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .alias-chip {
      display: inline-block;
      background-color: #e0e0e0;
      padding: 4px 10px;
      margin: 2px;
      border-radius: 15px;
      font-size: 0.85rem;
    }
    .alias-chip button {
      background: none;
      border: none;
      margin-left: 5px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body class="container py-4">
  <h2 class="mb-4">🛠️ Edit Symptom Definitions</h2>

  <div class="accordion" id="aliasAccordion">
    {% for symptom, data in tree.items() %}
    <div class="accordion-item mb-3">
      <h2 class="accordion-header" id="heading-{{ loop.index }}">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-{{ loop.index }}">
          {{ symptom }}
        </button>
      </h2>
      <div id="collapse-{{ loop.index }}" class="accordion-collapse collapse">
        <div class="accordion-body">
          <label><strong>Response:</strong></label>
          <textarea class="form-control mb-3" name="response">{{ data.response }}</textarea>

          <label><strong>Aliases:</strong></label>
          <div class="mb-2" data-aliases>
            {% for alias in data.aliases %}
            <span class="alias-chip">{{ alias }} <button type="button" onclick="removeAlias(this)">×</button></span>
            {% endfor %}
          </div>
          <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Add new alias">
            <button class="btn btn-outline-primary" type="button" onclick="addAlias(this)">Add</button>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" {% if data.requires_escalation %}checked{% endif %}>
            <label class="form-check-label">Requires Escalation</label>
          </div>

          <button class="btn btn-success" onclick="saveSymptom(this, '{{ symptom }}')">💾 Save {{ symptom }}</button>
          <span class="text-success ms-2" data-save-status></span>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function removeAlias(btn) {
      btn.closest('.alias-chip').remove();
    }

    function addAlias(button) {
      const input = button.previousElementSibling;
      const value = input.value.trim();
      if (!value) return;
      const container = button.closest('.accordion-body').querySelector('[data-aliases]');
      const chip = document.createElement('span');
      chip.className = 'alias-chip';
      chip.innerHTML = `${value} <button type="button" onclick="removeAlias(this)">×</button>`;
      container.appendChild(chip);
      input.value = '';
    }

    function saveSymptom(button, symptomName) {
      const card = button.closest('.accordion-body');
      const response = card.querySelector('textarea[name="response"]').value.trim();
      const escalation = card.querySelector('input[type="checkbox"]').checked;
      const aliasChips = card.querySelectorAll('[data-aliases] .alias-chip');
      const aliases = Array.from(aliasChips).map(chip => chip.textContent.trim().slice(0, -1));

      fetch("/save-aliases", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ [symptomName]: { response, aliases, requires_escalation: escalation } })
      })
      .then(res => res.json())
      .then(data => {
        const status = card.querySelector('[data-save-status]');
        status.textContent = "✔ Saved";
        setTimeout(() => status.textContent = "", 2000);
      });
    }
  </script>
</body>
</html>
