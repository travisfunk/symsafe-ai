<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Edit Symptom Aliases</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f8f9f9; }
    .symptom-block { margin-bottom: 2rem; background: #fff; padding: 1rem; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    textarea { width: 100%; height: 80px; font-size: 14px; font-family: sans-serif; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    .alias-list span {
      display: inline-block; background: #ddd; margin: 4px; padding: 4px 8px; border-radius: 12px;
    }
    .badge { display: inline-block; font-size: 12px; padding: 3px 8px; border-radius: 10px; margin: 4px; color: white; }
    .badge.safe { background: green; }
    .badge.unsafe { background: red; }
    .badge.warn { background: orange; }
    .history-box { background: #f1f1f1; padding: 6px; border-radius: 6px; font-size: 13px; margin-top: 10px; }
    .history-box code { display: block; background: #fff; padding: 6px; margin: 4px 0; border-radius: 4px; }
    button { margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Edit Aliases & Tone Settings</h1>

  {% for label, entry in tree.items() %}
    <div class="symptom-block" id="block-{{ loop.index }}">
      <h3>{{ label }}</h3>
      <label>Response:</label>
      <textarea id="response-{{ loop.index }}">{{ entry.response }}</textarea>
      <button class="rewrite-btn" data-label="{{ label }}" data-target="response-{{ loop.index }}">✍️ Rewrite Tone</button>
      <div class="flags" id="flags-{{ loop.index }}"></div>
      <div class="history-box" id="history-{{ label | replace(' ', '_') }}">
        <strong>Recent Rewrites:</strong>
        <em>Loading...</em>
      </div>
      <p><strong>Aliases:</strong></p>
      <div class="alias-list">
        {% for alias in entry.aliases %}
          <span>{{ alias }}</span>
        {% endfor %}
      </div>
    </div>
  {% endfor %}

<script>
function flagAnalysis(text, containerId) {
  const flags = [];
  const txt = text.toLowerCase();
  if (txt.includes("sorry") || txt.includes("uncomfortable")) {
    flags.push('<span class="badge safe">✅ Empathy</span>');
  } else {
    flags.push('<span class="badge warn">⚠️ Lacks Empathy</span>');
  }
  if (txt.includes("seek") || txt.includes("provider") || txt.includes("urgent")) {
    flags.push('<span class="badge safe">✅ Escalation</span>');
  } else {
    flags.push('<span class="badge warn">⚠️ No Escalation</span>');
  }
  if (txt.includes("you might have") || txt.includes("could be")) {
    flags.push('<span class="badge unsafe">❌ Diagnosis Risk</span>');
  } else {
    flags.push('<span class="badge safe">✅ No Diagnosis</span>');
  }
  if (txt.includes("emergency") || txt.includes("911")) {
    flags.push('<span class="badge safe">✅ Safety</span>');
  }
  document.getElementById(containerId).innerHTML = flags.join(" ");
}

function renderHistoryFromFile(label, container) {
  fetch("/rewrite-history")
    .then(res => res.json())
    .then(historyData => {
      const clean = label.toLowerCase();
      const list = historyData[clean] || [];
      if (list.length === 0) {
        container.innerHTML = "<strong>Recent Rewrites:</strong> <em>None found</em>";
        return;
      }
      container.innerHTML = "<strong>Recent Rewrites:</strong>";
      list.forEach(entry => {
        container.innerHTML += `<code>${entry.timestamp}: ${entry.response}</code>`;
      });
    })
    .catch(err => {
      container.innerHTML = "<em>Error loading history</em>";
    });
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".rewrite-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.target;
      const label = btn.dataset.label;
      const textarea = document.getElementById(id);
      const flags = document.getElementById("flags-" + id.split("-")[1]);
      const original = textarea.value.trim();

      if (!original) return;

      textarea.disabled = true;
      btn.textContent = "⏳ Rewriting...";

      fetch("/rewrite-response", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: original })
      })
        .then(res => res.json())
        .then(data => {
          if (data.rewritten) {
            textarea.value = data.rewritten;
            flagAnalysis(data.rewritten, flags.id);

            // save to backend
            fetch("/save-rewrite-history", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ label: label.toLowerCase(), response: data.rewritten })
            });

            const historyBox = document.getElementById("history-" + label.replace(/\s/g, "_"));
            renderHistoryFromFile(label, historyBox);
            btn.textContent = "✅ Rewritten & Saved";
          } else {
            btn.textContent = "⚠️ Error";
          }
        })
        .catch(err => {
          btn.textContent = "❌ Rewrite Failed";
        })
        .finally(() => {
          textarea.disabled = false;
        });
    });
  });

  // load history for each block
  {% for label in tree.keys() %}
    const container = document.getElementById("history-{{ label | replace(' ', '_') }}");
    renderHistoryFromFile("{{ label }}", container);
  {% endfor %}
});
</script>
</body>
</html>
