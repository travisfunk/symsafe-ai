services:
  - type: web
    name: symsafe-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run_web:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: REVIEW_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
